name: Publish

on:
  push:
    branches: [main]
    paths: ['version.txt']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verify version sync
        id: check
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          SDK_VERSION=$(node -p "require('./sdk/package.json').version")
          CLI_VERSION=$(node -p "require('./cli/package.json').version")

          echo "version.txt: $VERSION | SDK: $SDK_VERSION | CLI: $CLI_VERSION"

          if [ "$VERSION" != "$SDK_VERSION" ] || [ "$VERSION" != "$CLI_VERSION" ]; then
            echo "::error::Versions must match — version.txt ($VERSION), SDK ($SDK_VERSION), CLI ($CLI_VERSION)"
            exit 1
          fi

          # Check if version actually changed
          PREV=$(git show HEAD~1:version.txt 2>/dev/null | tr -d '[:space:]' || echo "")
          echo "Previous: $PREV → Current: $VERSION"

          if [ "$VERSION" != "$PREV" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

  publish-npm:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build and publish SDK
        working-directory: sdk
        run: |
          npm install
          npm run test
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and publish CLI
        working-directory: cli
        run: |
          npm install
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-aar:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      matrix:
        atak-version: ['5.4.0', '5.5.0', '5.5.1', '5.6.0']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download ATAK SDK
        run: ./scripts/download-sdk.sh ${{ matrix.atak-version }}
        env:
          GH_TOKEN: ${{ secrets.CI_SDK_TOKEN }}

      - name: Build and publish to Maven Central
        run: |
          cd lib
          ./gradlew :bridge:publishAndReleaseToMavenCentral \
            -PatakSdkPath=sdks/${{ matrix.atak-version }}/main.jar \
            -PatakVersion=${{ matrix.atak-version }} \
            -PRELEASE_SIGNING_ENABLED=true
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}

  release:
    needs: [check-version, publish-npm, publish-aar]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create git tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"
          git tag "$VERSION" || true
          git push origin "$VERSION" || true
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            || echo "Release already exists"
