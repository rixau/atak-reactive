name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install and test SDK
        working-directory: sdk
        run: |
          npm install
          npm run build
          npm test

  cli-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build CLI
        working-directory: cli
        run: |
          npm install
          npm run build

  lib-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download ATAK SDK (5.6.0)
        run: ./scripts/download-sdk.sh 5.6.0
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Compile bridge
        run: |
          cd lib
          ./gradlew :bridge:assembleRelease \
            -PatakSdkPath=sdks/5.6.0/main.jar
